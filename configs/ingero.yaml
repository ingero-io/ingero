# Ingero GPU Observability Agent - Default Configuration

# Agent settings
agent:
  # Overhead target: adaptive sampling adjusts to stay under this
  max_overhead_percent: 2.0
  # Log level: debug, info, warn, error
  log_level: info
  # Node identity for multi-node correlation (empty = auto-detect via os.Hostname())
  node: ""

# Probe configuration
probes:
  cuda:
    enabled: true
    # Path to libcudart.so (auto-detected if empty)
    library_path: ""
    # ringbuf_size: 8388608  # 8MB default, must be power of 2
  driver:
    enabled: true
    # CUDA Driver API uprobes on libcuda.so (auto-detected)
    # ringbuf_size: 8388608  # 8MB default, must be power of 2
  cudagraph:
    enabled: true
    # ringbuf_size: 4194304  # 4MB default, must be power of 2
  host:
    enabled: true
    # Tracepoints: sched_switch, sched_wakeup, mm_page_alloc, oom_kill
    tracepoints:
      - sched_switch
      - sched_wakeup
      - mm_page_alloc
    # ringbuf_size: 1048576  # 1MB default, must be power of 2
  blockio:
    enabled: true
    # ringbuf_size: 1048576  # 1MB default, must be power of 2
  net:
    enabled: true
    # ringbuf_size: 524288   # 512KB default, must be power of 2
  tcp:
    enabled: true
    # ringbuf_size: 262144   # 256KB default, must be power of 2

# Storage
store:
  # SQLite database path (default: ~/.ingero/ingero.db)
  path: ~/.ingero/ingero.db
  # Max DB size (e.g., 10g, 500m, 1t). 0 = unlimited.
  max_db_size: 10g

# MCP server
mcp:
  enabled: true
  # Transport: stdio or http
  transport: stdio

# OTLP export (optional, disabled by default)
otlp:
  enabled: false
  endpoint: ""
  protocol: grpc
  insecure: true
  export_interval: 10s

# Prometheus /metrics endpoint (optional, disabled by default)
prometheus:
  enabled: false
  listen: ":9090"

# Fleet configuration for multi-node queries
fleet:
  # Node addresses for fan-out queries (host:port)
  # Used by: ingero query --nodes, ingero explain --nodes
  # CLI --nodes flag overrides this list
  nodes: []
