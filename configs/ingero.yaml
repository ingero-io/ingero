# Ingero GPU Observability Agent - Default Configuration

# Agent settings
agent:
  # Overhead target: adaptive sampling adjusts to stay under this
  max_overhead_percent: 2.0
  # Log level: debug, info, warn, error
  log_level: info
  # Node identity for multi-node correlation (empty = auto-detect via os.Hostname())
  node: ""

# Probe configuration
probes:
  cuda:
    enabled: true
    # Path to libcudart.so (auto-detected if empty)
    library_path: ""
    # ringbuf_size: 8388608  # 8MB default, must be power of 2
  driver:
    enabled: true
    # CUDA Driver API uprobes on libcuda.so (auto-detected)
    # ringbuf_size: 8388608  # 8MB default, must be power of 2
  cudagraph:
    enabled: true
    # ringbuf_size: 4194304  # 4MB default, must be power of 2
  host:
    enabled: true
    # Tracepoints: sched_switch, sched_wakeup, mm_page_alloc, oom_kill
    tracepoints:
      - sched_switch
      - sched_wakeup
      - mm_page_alloc
    # ringbuf_size: 1048576  # 1MB default, must be power of 2
  blockio:
    enabled: true
    # ringbuf_size: 1048576  # 1MB default, must be power of 2
  net:
    enabled: true
    # ringbuf_size: 524288   # 512KB default, must be power of 2
  tcp:
    enabled: true
    # ringbuf_size: 262144   # 256KB default, must be power of 2

# Storage
store:
  # SQLite database path (default: ~/.ingero/ingero.db)
  path: ~/.ingero/ingero.db
  # Max DB size (e.g., 10g, 500m, 1t). 0 = unlimited.
  max_db_size: 10g

# MCP server
mcp:
  enabled: true
  # Transport: stdio or http
  transport: stdio

# Health score (Fleet integration). Score is computed only when fleet.endpoint
# is set; weights and floor tune the score formula.
health:
  # Signal weights. Must sum to 1.0.
  weights:
    throughput: 0.40
    compute: 0.25
    memory: 0.20
    cpu: 0.15
  # Smooth floor penalty: if the minimum signal drops below degradation_zone,
  # a penalty multiplier ramps linearly from 1.0 down to 0.5 as the minimum
  # approaches penalty_floor. At or below penalty_floor the penalty caps at 0.5.
  floor:
    degradation_zone: 0.35
    penalty_floor: 0.25
  # Per-signal baselines: fast EMA adapts to current workload, hard floor
  # detects slow long-term degradation. A degradation warning fires when any
  # signal's fast EMA divided by its hard-floor EMA falls below warning_ratio
  # and the baseliner has seen at least warmup_samples observations.
  baseline:
    fast_alpha: 0.1
    floor_alpha: 0.001
    warning_ratio: 0.5
    warmup_samples: 30
  # Lifecycle state machine: CALIBRATING -> ACTIVE -> IDLE <-> CALIBRATING,
  # with STALE as a recovery-via-CALIBRATING state for event-read failures.
  state:
    # Consecutive zero-launch intervals before ACTIVE -> IDLE.
    idle_intervals: 3
    # Observations required in CALIBRATING before transitioning to ACTIVE.
    # Should match baseline.warmup_samples.
    warmup_samples: 30
    # Consecutive event-read failures before any -> STALE.
    stale_read_failures: 3
  # Baseline persistence across agent restarts. Graceful shutdown writes the
  # baseline to path; on startup, if the file is newer than stale_age the
  # agent restores it and enters ACTIVE directly — avoiding a rolling-update
  # calibration storm.
  persistence:
    path: /var/lib/ingero/health-baseline.json
    stale_age: 10m

# OTLP export (optional, disabled by default)
otlp:
  enabled: false
  endpoint: ""
  protocol: grpc
  insecure: true
  export_interval: 10s

# Prometheus /metrics endpoint (optional, disabled by default)
prometheus:
  enabled: false
  listen: ":9090"

# Fleet configuration.
#
# Two modes share this block:
#   - Multi-node queries (v0.9.1+): nodes[] for fan-out SQL/explain/export.
#   - Health-score push (v0.10+, Fleet integration): endpoint + cluster_id
#     push agent health scores to a central Fleet collector.
# CLI flags --nodes / --fleet-endpoint override the corresponding fields.
fleet:
  # Multi-node queries.
  nodes: []

  # Health-score push (Fleet integration). Leaving endpoint empty disables
  # the push loop — agent behaves exactly as in v0.9.x.
  endpoint: ""
  cluster_id: ""
  # Workload label on every push: training | inference | unknown
  workload_type: unknown
  push_interval: 10s
  timeout: 5s
  # Use HTTP instead of HTTPS when endpoint is bare host:port.
  insecure: false
  # Consecutive push failures before ingero.agent.fleet_reachable flips to 0.
  failure_threshold: 3
  # mTLS material (all three required together for Fleet to be authenticated).
  tls:
    ca_cert: ""
    client_cert: ""
    client_key: ""
  # Optional distributed-training labels. 0 = not distributed.
  world_size: 0
  node_rank: 0
