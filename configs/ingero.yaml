# Ingero GPU Observability Agent - Default Configuration

# Agent settings
agent:
  # Overhead target: adaptive sampling adjusts to stay under this
  max_overhead_percent: 2.0
  # Log level: debug, info, warn, error
  log_level: info
  # Node identity for multi-node correlation (empty = auto-detect via os.Hostname())
  node: ""

# Probe configuration
probes:
  cuda:
    enabled: true
    # Path to libcudart.so (auto-detected if empty)
    library_path: ""
    # ringbuf_size: 8388608  # 8MB default, must be power of 2
  driver:
    enabled: true
    # CUDA Driver API uprobes on libcuda.so (auto-detected)
    # ringbuf_size: 8388608  # 8MB default, must be power of 2
  cudagraph:
    enabled: true
    # ringbuf_size: 4194304  # 4MB default, must be power of 2
  host:
    enabled: true
    # Tracepoints: sched_switch, sched_wakeup, mm_page_alloc, oom_kill
    tracepoints:
      - sched_switch
      - sched_wakeup
      - mm_page_alloc
    # ringbuf_size: 1048576  # 1MB default, must be power of 2
  blockio:
    enabled: true
    # ringbuf_size: 1048576  # 1MB default, must be power of 2
  net:
    enabled: true
    # ringbuf_size: 524288   # 512KB default, must be power of 2
  tcp:
    enabled: true
    # ringbuf_size: 262144   # 256KB default, must be power of 2

# Storage
store:
  # SQLite database path (default: ~/.ingero/ingero.db)
  path: ~/.ingero/ingero.db
  # Max DB size (e.g., 10g, 500m, 1t). 0 = unlimited.
  max_db_size: 10g

# MCP server
mcp:
  enabled: true
  # Transport: stdio or http
  transport: stdio

# Health score (Fleet integration). Score is computed only when fleet.endpoint
# is set; weights and floor tune the score formula.
health:
  # Signal weights. Must sum to 1.0.
  weights:
    throughput: 0.40
    compute: 0.25
    memory: 0.20
    cpu: 0.15
  # Smooth floor penalty: if the minimum signal drops below degradation_zone,
  # a penalty multiplier ramps linearly from 1.0 down to 0.5 as the minimum
  # approaches penalty_floor. At or below penalty_floor the penalty caps at 0.5.
  floor:
    degradation_zone: 0.35
    penalty_floor: 0.25
  # Per-signal baselines: fast EMA adapts to current workload, hard floor
  # detects slow long-term degradation. A degradation warning fires when any
  # signal's fast EMA divided by its hard-floor EMA falls below warning_ratio
  # and the baseliner has seen at least warmup_samples observations.
  baseline:
    fast_alpha: 0.1
    floor_alpha: 0.001
    warning_ratio: 0.5
    warmup_samples: 30
  # Lifecycle state machine: CALIBRATING -> ACTIVE -> IDLE <-> CALIBRATING,
  # with STALE as a recovery-via-CALIBRATING state for event-read failures.
  state:
    # Consecutive zero-launch intervals before ACTIVE -> IDLE.
    idle_intervals: 3
    # Observations required in CALIBRATING before transitioning to ACTIVE.
    # Should match baseline.warmup_samples.
    warmup_samples: 30
    # Consecutive event-read failures before any -> STALE.
    stale_read_failures: 3
  # Baseline persistence across agent restarts. Graceful shutdown writes the
  # baseline to path; on startup, if the file is newer than stale_age the
  # agent restores it and enters ACTIVE directly — avoiding a rolling-update
  # calibration storm.
  persistence:
    path: /var/lib/ingero/health-baseline.json
    stale_age: 10m

# OTLP traces export for detection events (optional, disabled by default).
# Wired into `ingero fleet-push` since v0.13: this block drives the runtime
# tracer setup. The --otlp-enabled / --otlp-endpoint / --otlp-insecure CLI
# flags override the corresponding YAML fields when explicitly set.
#
# Drives one root span per detection-event rising edge (straggler classifier
# rising edge, baseliner DegradationWarning rising edge); the falling edge
# ends the span with outcome=resolved. Independent from the metrics path,
# which still flows through the `fleet:` block below - the same agent
# emits both. The BatchSpanProcessor uses default OTel parameters
# (max queue 2048, batch 512, scheduled flush every 5s). v0.13 ships
# HTTP/protobuf only; gRPC defers (the `protocol` key is reserved, and
# export_interval is reserved for future use - the BatchSpanProcessor
# default schedule applies today).
otlp:
  enabled: false
  endpoint: ""
  protocol: grpc
  insecure: true
  export_interval: 10s

# Alerter integration (optional). Wired into `ingero mcp` since v0.13: the
# pagerduty.routing_key field enables the pagerduty_trigger MCP tool.
# The --pagerduty-routing-key CLI flag overrides routing_key when explicitly
# set. Leaving routing_key empty (or omitting the block) keeps the tool
# registered but returns "not configured" at call time.
#
# This is the agent-side PagerDuty wiring - distinct from the alerter
# sidecar (which has its own JSON config and consumes the same Events v2
# API). The agent uses PagerDuty for AI-driven escalation via MCP; the
# sidecar uses it for autonomous straggler events from the UDS socket.
alerter:
  pagerduty:
    routing_key: ""

# Inference daemon-mode umbrella (v0.16+). Wired into `ingero trace`
# since v0.16: setting inference.enabled (or passing --inference on
# the CLI) flips a coordinated set of defaults appropriate for a 24/7
# inference daemon. CLI flags override individual fields when
# explicitly set; leaving both this block and --inference unset
# preserves the prior trace behavior for one-shot debugging runs.
#
# Per-workload step-duration outliers are emitted on the FOSS UDS
# socket (when `--remediate` is on) as `inference_outlier` typed
# messages. Consumers (the EE orchestrator, custom operator scripts)
# subscribe and react however they choose — the FOSS agent's only
# job is publication.
inference:
  enabled: false
  baseline:
    # Healthy steps required before per-workload outlier classification
    # activates. Lower = faster detection but more false positives
    # during initial calibration.
    warmup_samples: 30
    # Pause baseline updates while a causal chain at this severity or
    # higher is active for the PID. Set "" to disable.
    pause_on_severity: HIGH
  # v0.16.1: phase-aware baselines split per-(cgroup,pid,stream)
  # baselines into per-phase sub-baselines (prefill / decode / mixed
  # / unknown). Eliminates false negatives on heterogeneous-task
  # streams (vLLM continuous batching, single-stream PyTorch with
  # mixed prompt sizes) by classifying each step from observable
  # signals (kernel launches, NCCL participation, avg kernel
  # duration) — duration-INVARIANT so a slow decode is still decode.
  phase:
    classifier: rule          # rule (default) | off
    decode_max_launches: 50
    decode_max_memcpy: 1m
    prefill_min_launches: 200
    prefill_min_avg_kernel: 500us
    mixed_memcpy: 10m
    mixed_launch_low: 50
    mixed_launch_high: 200
  outlier:
    # Multiplier on baseline p95 for the LARGEST outlier bucket.
    # Smaller buckets fire at fixed 1.5x and 2x.
    threshold_ratio: 3.0
    # Smallest outlier bucket that bumps the store sampler to admit
    # 100% of events for the cooldown window. 1.5x | 2x | 3x | off.
    sampler_degrade_on: 3x
  db_rollover:
    # Rotate the SQLite trace DB when its size crosses this value.
    # Empty disables rollover; mutually exclusive with --max-db.
    size: 1g
    # Number of rolled-over files retained on disk (oldest deleted).
    keep: 6
  daemon:
    # Trace duration. 0 = run until ctx cancellation (the daemon shape).
    duration: 0s
    # Operator-supplied log path. When empty AND --log is not set, the
    # umbrella picks /tmp/ingero-trace-<pid>.log so stderr stays clean
    # for systemd / k8s log collectors.
    log_path: ""
  # v0.16.2: engine /metrics scrape. Auto-detect vLLM/TGI/SGLang/
  # Triton from the target PIDs' cmdlines and periodically pull
  # /metrics. Maps engine-specific Prometheus names to OTel GenAI
  # semantic conventions (gen_ai.client.operation.time_to_first_token,
  # gen_ai.server.time_per_output_token, etc.) so any downstream
  # consumer (Datadog, Grafana, Honeycomb, Arize) sees TTFT/TPOT
  # without any Ingero-specific dashboard work.
  scrape:
    enabled: auto      # auto (default; auto-detect from cmdline) | off
    interval: 10s
    # Engine /metrics host. 127.0.0.1 covers same-pod deployments
    # (the typical case). Override only for sidecar-on-different-host
    # topologies.
    host: "127.0.0.1"

# Prometheus /metrics endpoint (optional, disabled by default)
prometheus:
  enabled: false
  listen: ":9090"

# Fleet configuration.
#
# Two modes share this block:
#   - Multi-node queries (v0.9.1+): nodes[] for fan-out SQL/explain/export.
#   - Health-score push (v0.10+, Fleet integration): endpoint + cluster_id
#     push agent health scores to a central Fleet collector.
# CLI flags --nodes / --fleet-endpoint override the corresponding fields.
fleet:
  # Multi-node queries.
  nodes: []

  # Health-score push (Fleet integration). Leaving endpoint empty disables
  # the push loop — agent behaves exactly as in v0.9.x.
  endpoint: ""
  cluster_id: ""
  # Workload label on every push: training | inference | unknown
  workload_type: unknown
  push_interval: 10s
  timeout: 5s
  # Use HTTP instead of HTTPS when endpoint is bare host:port.
  insecure: false
  # Consecutive push failures before ingero.agent.fleet_reachable flips to 0.
  failure_threshold: 3
  # mTLS material (all three required together for Fleet to be authenticated).
  tls:
    ca_cert: ""
    client_cert: ""
    client_key: ""
  # Optional distributed-training labels. 0 = not distributed.
  world_size: 0
  node_rank: 0
