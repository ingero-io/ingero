name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (leave empty for latest v* tag)'
        required: false
        type: string

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        if: github.event_name == 'workflow_dispatch'
        id: resolve-tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG=$(git tag --list 'v*' --sort=-version:refname | head -1)
          fi
          echo "Releasing tag: $TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete existing release assets
        if: github.event_name == 'workflow_dispatch'
        run: |
          TAG="${{ steps.resolve-tag.outputs.tag }}"
          gh release view "$TAG" --json assets -q '.assets[].name' 2>/dev/null | while read -r name; do
            echo "Deleting asset: $name"
            gh release delete-asset "$TAG" "$name" --yes
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: >-
            release --clean
            ${{ github.event_name == 'workflow_dispatch' && '--skip=validate' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.resolve-tag.outputs.tag || github.ref_name }}

  doc-sync:
    name: Sync doc version pins
    needs: release
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_DOC_SYNC_APP_ID }}
          private-key: ${{ secrets.RELEASE_DOC_SYNC_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Resolve tag
        id: resolve-tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG=$(git tag --list 'v*' --sort=-version:refname | head -1)
          fi
          echo "Resolved tag: $TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Configure git identity
        run: |
          git config user.name "ingero-doc-sync-bot[bot]"
          git config user.email "ingero-doc-sync-bot[bot]@users.noreply.github.com"

      - name: Run release_doc_sync rewriter
        id: sync
        run: |
          TAG="${{ steps.resolve-tag.outputs.tag }}"
          BRANCH="chore/release-doc-sync-${TAG}"
          git checkout -B "$BRANCH"
          python .github/scripts/release_doc_sync.py \
            --tag "$TAG" \
            --product ingero \
            --channel stable
          if git diff --quiet; then
            echo "No anchored pins needed rewriting for ${TAG}."
            echo "no_changes=true" >> "$GITHUB_OUTPUT"
          else
            git add -A
            git commit -m "chore(docs): sync version pins to ${TAG}"
            git push --force-with-lease origin "$BRANCH"
            echo "no_changes=false" >> "$GITHUB_OUTPUT"
            echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          fi

      - name: Open or update PR
        if: steps.sync.outputs.no_changes != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          TAG="${{ steps.resolve-tag.outputs.tag }}"
          BRANCH="${{ steps.sync.outputs.branch }}"
          EXISTING=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "Reusing existing PR #${EXISTING} for ${BRANCH} (re-run of same tag)."
          else
            BODY_FILE=$(mktemp)
            {
              echo "Auto-generated by the release workflow after \`${TAG}\` was tagged."
              echo
              echo "Rewrites version pins in docs and config marked with \`ingero-version:\` anchors. Anchors tagged \`product=ingero channel=stable\` are updated to match the new tag; anchors for other products or channels are skipped."
              echo
              echo "The diff should contain only version-token rewrites, no structural changes. Merge to propagate the new version into user-facing install instructions and Helm chart metadata."
            } > "$BODY_FILE"
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "chore(docs): sync version pins to ${TAG}" \
              --body-file "$BODY_FILE"
          fi
