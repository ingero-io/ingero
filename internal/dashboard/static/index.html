<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingero GPU Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0c10; --bg-card: #12151c; --border: #1e2330; --bg-sub: #0d0f14;
      --text: #e8eaf0; --text-sec: #8890a4; --text-muted: #555d74;
      --green: #22c55e; --green-dim: #166534;
      --amber: #f59e0b; --amber-dim: #92400e;
      --red: #ef4444; --red-dim: #991b1b;
      --cyan: #06b6d4; --cyan-dim: #155e75;
      --blue: #3b82f6; --purple: #a855f7;
      --font-mono: 'Menlo', 'Consolas', 'Monaco', 'Liberation Mono', monospace;
      --font-sans: system-ui, -apple-system, sans-serif;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font-sans); font-size: 13px; line-height: 1.5; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .5; } }
    @keyframes spin { to { transform: rotate(360deg); } }

    .container { max-width: 1400px; margin: 0 auto; padding: 16px 20px; }

    /* Header */
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 12px; }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-left h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
    .header-sub { font-size: 10px; color: var(--text-muted); font-family: var(--font-mono); margin-top: 4px; margin-left: 18px; letter-spacing: 0.08em; }
    .header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot.ok { background: var(--green); box-shadow: 0 0 12px var(--green); }
    .dot.warn { background: var(--amber); box-shadow: 0 0 12px var(--amber); animation: pulse 1.5s infinite; }
    .dot.err { background: var(--red); box-shadow: 0 0 12px var(--red); animation: pulse 1.5s infinite; }
    .dot.off { background: var(--text-muted); }

    .time-select { display: flex; gap: 4px; }
    .time-select button { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-sec); padding: 3px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; font-family: var(--font-mono); }
    .time-select button.active { background: var(--border); color: var(--text); border-color: var(--text-muted); }

    .level-toggle { display: flex; align-items: center; gap: 2px; background: var(--bg-card); border-radius: 6px; border: 1px solid var(--border); padding: 2px; }
    .level-btn { font-size: 9px; font-family: var(--font-mono); font-weight: 700; padding: 4px 8px; border-radius: 4px; cursor: pointer; border: none; background: transparent; color: var(--text-muted); transition: all 0.15s; }
    .level-btn.active { background: rgba(59,130,246,0.13); color: var(--blue); }

    /* Cards & Sections */
    .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
    .section-hdr { font-size: 10px; color: var(--text-muted); font-family: var(--font-mono); letter-spacing: 0.08em; text-transform: uppercase; }

    /* Accordion */
    .accordion { margin-bottom: 12px; }
    .accordion-head { display: flex; align-items: center; gap: 8px; padding: 10px 14px; cursor: pointer; user-select: none; }
    .accordion-head:hover { background: rgba(30,35,48,0.3); }
    .accordion-arrow { color: var(--text-muted); font-size: 11px; transition: transform 0.2s; }
    .accordion-arrow.open { transform: rotate(90deg); }
    .accordion-badge { font-size: 9px; font-weight: 700; color: var(--blue); font-family: var(--font-mono); background: rgba(59,130,246,0.09); padding: 2px 6px; border-radius: 3px; }
    .accordion-label { font-size: 11px; font-weight: 600; color: var(--text-sec); letter-spacing: 0.06em; }
    .accordion-info { margin-left: auto; display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px; border-radius: 50%; font-size: 9px; font-weight: 700; font-family: var(--font-mono); cursor: pointer; color: var(--text-muted); border: 1px solid var(--border); background: transparent; position: relative; }
    .accordion-body { padding: 0 14px 14px; }

    /* Scorecards */
    .sc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .scorecard { border-radius: 8px; padding: 10px 12px; display: flex; align-items: center; gap: 10px; }
    .sc-label { font-size: 8px; color: var(--text-muted); font-family: var(--font-mono); letter-spacing: 0.05em; }
    .sc-value { font-size: 14px; font-weight: 700; font-family: var(--font-mono); }

    /* Banner */
    .banner { border-radius: 10px; padding: 12px 16px; margin-bottom: 12px; display: flex; align-items: flex-start; gap: 12px; }
    .banner-icon { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
    .banner-title { font-size: 12px; font-weight: 600; margin-bottom: 2px; }
    .banner-desc { font-size: 11px; color: var(--text-sec); line-height: 1.5; }

    /* Causal Chain horizontal */
    .chain-horiz { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .chain-pill { display: inline-flex; align-items: center; gap: 5px; border-radius: 5px; padding: 5px 10px; font-size: 10px; font-family: var(--font-mono); }
    .chain-pill .ch-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .chain-pill .ch-layer { font-weight: 700; }
    .chain-pill .ch-metric { color: var(--text-sec); }
    .chain-arrow { color: var(--text-muted); font-size: 12px; }
    .chain-toggle { display: flex; gap: 4px; margin-left: auto; }
    .chain-toggle-btn { font-size: 9px; font-family: var(--font-mono); padding: 3px 8px; border-radius: 4px; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text-muted); }
    .chain-toggle-btn.active { background: rgba(59,130,246,0.12); color: var(--blue); border-color: var(--blue); }

    /* Recommendations */
    .rec-item { border-radius: 6px; padding: 8px 10px; margin-bottom: 6px; }
    .rec-item:last-child { margin-bottom: 0; }
    .rec-pri { font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 3px; font-family: var(--font-mono); }
    .rec-title { font-size: 11px; font-weight: 600; }
    .rec-desc { font-size: 10px; color: var(--text-sec); margin-top: 3px; }

    /* Pipeline metrics with bars */
    .metric-bar { display: flex; align-items: center; gap: 8px; padding: 3px 0; }
    .metric-bar .mb-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .metric-bar .mb-label { color: var(--text-sec); font-size: 10px; font-family: var(--font-mono); min-width: 90px; flex-shrink: 0; }
    .metric-bar .mb-track { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .metric-bar .mb-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
    .metric-bar .mb-val { font-size: 10px; font-family: var(--font-mono); font-weight: 600; min-width: 32px; text-align: right; }

    /* Stall bars */
    .stall-bar { display: flex; align-items: center; gap: 8px; padding: 3px 0; }
    .stall-bar .sb-label { color: var(--text-muted); font-size: 10px; font-family: var(--font-mono); width: 80px; flex-shrink: 0; }
    .stall-bar .sb-track { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .stall-bar .sb-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
    .stall-bar .sb-val { color: var(--text-muted); font-size: 10px; font-family: var(--font-mono); width: 35px; text-align: right; }

    /* Ops table */
    .ops-table { width: 100%; border-collapse: collapse; font-family: var(--font-mono); font-size: 12px; }
    .ops-table th { text-align: left; padding: 6px 10px; color: var(--text-muted); font-weight: 500; border-bottom: 1px solid var(--border); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
    .ops-table td { padding: 6px 10px; border-bottom: 1px solid var(--bg-sub); }
    .ops-table tr:hover { background: #161922; }
    .ops-table .num { text-align: right; }
    .ops-table .src { color: var(--text-muted); font-size: 10px; }

    /* Sparklines */
    .sparkline-row { display: flex; flex-direction: column; gap: 14px; }
    .sparkline-item { }
    .sparkline-label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .sparkline-label span { font-size: 8px; color: var(--text-muted); font-family: var(--font-mono); }
    .sparkline-label .val { font-size: 11px; color: var(--text); font-weight: 500; }
    .sparkline-svg { width: 100%; height: 32px; display: block; }

    /* Infra badges */
    .infra-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
    .infra-badge { display: flex; align-items: center; gap: 6px; padding: 6px 10px; background: var(--bg-sub); border-radius: 4px; font-size: 11px; }
    .infra-badge .indicator { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .infra-badge .indicator.on { background: var(--green); box-shadow: 0 0 4px var(--green); }
    .infra-badge .indicator.off { background: var(--text-muted); }
    .infra-badge .lbl { color: var(--text-sec); }
    .infra-badge .cnt { font-family: var(--font-mono); color: var(--text); margin-left: auto; }

    /* Grayed */
    .grayed { position: relative; pointer-events: none; }
    .grayed > *:not(.grayed-overlay) { opacity: 0.25; }
    .grayed-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 2; pointer-events: auto; }
    .grayed-tooltip { background: rgba(18,21,28,0.92); border: 1px solid var(--border); padding: 6px 12px; border-radius: 4px; font-size: 11px; color: #d4d8e4; white-space: nowrap; max-width: 320px; text-align: center; }

    /* Grids */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .grid-resp-2-3 { display: grid; grid-template-columns: 2fr 3fr; gap: 12px; }
    .grid-resp-1-2 { display: grid; grid-template-columns: minmax(240px, 1fr) 2fr; gap: 12px; }
    .sub-panel { background: rgba(30,35,48,0.09); border-radius: 8px; padding: 12px; }

    /* No data */
    .no-data { text-align: center; padding: 40px 20px; color: var(--text-muted); }
    .no-data p { margin: 8px 0; }
    .no-data code { font-family: var(--font-mono); background: var(--bg-card); padding: 2px 6px; border-radius: 3px; color: var(--text-sec); }

    /* Footer */
    .footer { margin-top: 16px; padding: 10px 0; border-top: 1px solid var(--border); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; font-size: 9px; color: var(--text-muted); font-family: var(--font-mono); }

    /* Cluster map mini */
    .cluster-gpus { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
    .cluster-gpu { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 56px; cursor: default; }
    .cluster-gpu-bar { width: 100%; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 9px; font-family: var(--font-mono); font-weight: 600; transition: all 0.6s ease; }
    .cluster-gpu-lbl { font-size: 7px; color: var(--text-muted); margin-top: 2px; font-family: var(--font-mono); }

    /* NVTX phase bar */
    .nvtx-bar { display: flex; gap: 1px; border-radius: 4px; overflow: hidden; margin-bottom: 10px; }
    .nvtx-seg { padding: 4px 6px; text-align: center; font-size: 8px; font-family: var(--font-mono); }

    @media (max-width: 768px) {
      .sc-grid { grid-template-columns: repeat(2, 1fr); }
      .grid-2, .grid-resp-2-3, .grid-resp-1-2 { grid-template-columns: 1fr; }
    }
    @media (max-width: 500px) {
      .sc-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container" id="app">
    <div class="no-data" id="loading">
      <div style="width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;"></div>
      <p>Connecting to Ingero...</p>
    </div>
  </div>
  <script>
(function() {
  'use strict';

  // --- State ---
  let capabilities = [];
  let overview = null;
  let ops = null;
  let chains = null;
  let snapshots = null;
  let snapshotHistory = { cpu: [], mem: [], load: [] };
  let sinceParam = '5m';
  let lastUpdate = null;
  let unavailableSet = new Set();
  let errorState = null;
  let openSections = { l1: true, l2: true, l3: true };
  let chainViewMode = 'chain'; // 'chain' or 'tree'
  let chainExpanded = false; // show all chains or just top 5

  const app = document.getElementById('app');

  // --- API ---
  const API = '/api/v1';

  async function fetchJSON(path) {
    const resp = await fetch(API + path);
    if (!resp.ok) throw new Error(resp.status + ' ' + resp.statusText);
    return resp.json();
  }

  async function loadCapabilities() {
    try {
      const caps = await fetchJSON('/capabilities');
      capabilities = caps;
      unavailableSet = new Set(caps.filter(function(c) { return !c.available; }).map(function(c) { return c.id; }));
    } catch (e) {
      console.error('capabilities:', e);
    }
  }

  async function loadAll() {
    try {
      var results = await Promise.all([
        fetchJSON('/overview'),
        fetchJSON('/ops?since=' + sinceParam),
        fetchJSON('/chains?since=' + sinceParam),
        fetchJSON('/snapshots?since=60s'),
      ]);
      overview = results[0];
      ops = results[1];
      chains = results[2];
      snapshots = results[3];
      errorState = null;

      if (snapshots && snapshots.snapshots && snapshots.snapshots.length > 0) {
        snapshotHistory.cpu = snapshots.snapshots.map(function(s) { return s.cpu_percent; });
        snapshotHistory.mem = snapshots.snapshots.map(function(s) { return s.mem_percent; });
        snapshotHistory.load = snapshots.snapshots.map(function(s) { return s.load_avg; });
      }

      lastUpdate = new Date();
      render();
    } catch (e) {
      console.error('poll error:', e);
      errorState = e.message;
      render();
    }
  }

  // --- Helpers ---
  function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  function fmt(n) { return n == null ? '-' : n.toLocaleString(); }
  function fmtUS(us) {
    if (us == null) return '-';
    if (us < 1000) return us + 'us';
    if (us < 1000000) return (us / 1000).toFixed(1) + 'ms';
    return (us / 1000000).toFixed(2) + 's';
  }
  function statusColor(v, lo, hi) {
    lo = lo || 70; hi = hi || 90;
    if (v >= hi) return 'var(--red)';
    if (v >= lo) return 'var(--amber)';
    return 'var(--green)';
  }
  function sevColor(s) {
    if (s === 'HIGH') return 'var(--red)';
    if (s === 'MEDIUM') return 'var(--amber)';
    return 'var(--green)';
  }
  function sevBg(s) {
    if (s === 'HIGH') return 'rgba(239,68,68,0.06)';
    if (s === 'MEDIUM') return 'rgba(245,158,11,0.06)';
    return 'rgba(34,197,94,0.06)';
  }
  function sevBorder(s) {
    if (s === 'HIGH') return 'rgba(239,68,68,0.25)';
    if (s === 'MEDIUM') return 'rgba(245,158,11,0.25)';
    return 'rgba(34,197,94,0.25)';
  }
  function layerColor(layer) {
    if (layer === 'SYSTEM') return 'var(--cyan)';
    if (layer === 'HOST' || layer === 'INFRA') return 'var(--amber)';
    if (layer === 'CUDA') return 'var(--green)';
    if (layer === 'ROOT') return 'var(--purple)';
    return 'var(--text-muted)';
  }
  function isGrayed(id) { return unavailableSet.has(id); }
  function grayTooltip(id) {
    var cap = capabilities.find(function(c) { return c.id === id; });
    return cap ? cap.tooltip : '';
  }

  function sparklineSVG(data, color, height) {
    if (!data || data.length < 2) return '<svg class="sparkline-svg" viewBox="0 0 200 ' + height + '"></svg>';
    height = height || 32;
    var w = 200;
    var max = Math.max.apply(null, data.concat([1]));
    var step = w / (data.length - 1);
    var pts = data.map(function(v, i) { return (i * step).toFixed(1) + ',' + (height - (v / max) * (height - 4) - 2).toFixed(1); });
    var polyPts = '0,' + height + ' ' + pts.join(' ') + ' ' + w + ',' + height;
    var last = pts[pts.length - 1];
    return '<svg class="sparkline-svg" viewBox="0 0 ' + w + ' ' + height + '" preserveAspectRatio="none">' +
      '<polygon points="' + polyPts + '" fill="' + color + '" opacity="0.15"/>' +
      '<polyline points="' + pts.join(' ') + '" fill="none" stroke="' + color + '" stroke-width="1.5"/>' +
      '<circle cx="' + last.split(',')[0] + '" cy="' + last.split(',')[1] + '" r="2.5" fill="' + color + '"/>' +
      '</svg>';
  }

  function wrapGrayed(id, html) {
    if (!isGrayed(id)) return html;
    return '<div class="grayed">' + html + '<div class="grayed-overlay"><div class="grayed-tooltip">' + esc(grayTooltip(id)) + '</div></div></div>';
  }

  function accordion(level, label, contentFn) {
    var isOpen = openSections[level.toLowerCase()];
    var h = '';
    h += '<div class="card accordion">';
    h += '<div class="accordion-head" onclick="window.__toggleSection(\'' + level.toLowerCase() + '\')">';
    h += '<span class="accordion-arrow ' + (isOpen ? 'open' : '') + '">&#9654;</span>';
    h += '<span class="accordion-badge">' + level + '</span>';
    h += '<span class="accordion-label">' + esc(label) + '</span>';
    h += '</div>';
    if (isOpen) {
      h += '<div class="accordion-body">' + contentFn() + '</div>';
    }
    h += '</div>';
    return h;
  }

  // Deduplicate chains by root_cause (normalize by stripping numbers for grouping)
  function deduplicateChains(allChains) {
    var groups = {};
    var order = [];
    allChains.forEach(function(ch) {
      // Normalize: strip numbers so "3782 sched_switch" and "3735 sched_switch" group together
      var key = (ch.root_cause || ch.summary).replace(/[0-9,]+/g, '#');
      if (!groups[key]) {
        groups[key] = { chain: ch, count: 1 };
        order.push(key);
      } else {
        groups[key].count++;
        // Keep highest severity
        var sevRank = { HIGH: 3, MEDIUM: 2, LOW: 1 };
        if ((sevRank[ch.severity] || 0) > (sevRank[groups[key].chain.severity] || 0)) {
          groups[key].chain = ch;
        }
      }
    });
    return order.map(function(k) { return groups[k]; });
  }

  // --- Render ---
  function render() {
    if (!overview && !errorState) {
      app.innerHTML = '<div class="no-data"><div style="width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;"></div><p>Connecting to Ingero...</p></div>';
      return;
    }

    if (errorState && !overview) {
      app.innerHTML = '<div class="no-data"><p style="color:var(--red);">Connection error: ' + esc(errorState) + '</p><p>Make sure <code>ingero trace</code> has been run to populate the database.</p></div>';
      return;
    }

    var ov = overview || {};
    var sys = ov.system || {};
    var tc = ov.top_chain;
    var hasChains = chains && chains.chains && chains.chains.length > 0;
    var hasOps = ops && ops.ops && ops.ops.length > 0;
    var hasSnapshots = snapshotHistory.cpu.length > 0;

    // Overall status
    var statusDot = 'ok', statusText = 'Healthy';
    if (tc) {
      if (tc.severity === 'HIGH') { statusDot = 'err'; statusText = 'Issue Detected'; }
      else if (tc.severity === 'MEDIUM') { statusDot = 'warn'; statusText = 'Warning'; }
    }
    if (ov.event_count === 0) { statusDot = 'off'; statusText = 'No Data'; }

    var html = '';

    // ── HEADER ──
    html += '<div class="header">';
    html += '<div>';
    html += '<div class="header-left">';
    html += '<div class="dot ' + statusDot + '"></div>';
    html += '<h1>INGERO</h1>';
    html += '</div>';
    var subParts = ['eBPF + CUDA PROBES', 'LIVE TELEMETRY'];
    if (ov.gpu) {
      if (ov.gpu.model) subParts.unshift(ov.gpu.model);
      var verParts = [];
      if (ov.gpu.driver_version) verParts.push('Driver ' + ov.gpu.driver_version);
      if (ov.gpu.cuda_version) verParts.push('CUDA ' + ov.gpu.cuda_version);
      if (verParts.length) subParts.push(verParts.join(' / '));
    }
    html += '<div class="header-sub">' + subParts.join(' &mdash; ') + '</div>';
    html += '</div>';
    html += '<div class="header-right">';
    html += '<div class="time-select">';
    ['1m','5m','15m','1h'].forEach(function(t) {
      html += '<button class="' + (sinceParam === t ? 'active' : '') + '" onclick="window.__setSince(\'' + t + '\')">' + t + '</button>';
    });
    html += '</div>';
    html += '<div class="level-toggle">';
    ['L1','L2','L3'].forEach(function(lv) {
      var k = lv.toLowerCase();
      html += '<button class="level-btn ' + (openSections[k] ? 'active' : '') + '" onclick="window.__toggleSection(\'' + k + '\')">' + lv + '</button>';
    });
    html += '</div>';
    if (lastUpdate) {
      html += '<span style="font-size:10px;color:var(--text-muted);font-family:var(--font-mono);">' + lastUpdate.toLocaleTimeString() + '</span>';
    }
    html += '</div>';
    html += '</div>';

    // ── L1: EXECUTIVE OVERVIEW ──
    html += accordion('L1', 'EXECUTIVE OVERVIEW', function() {
      var s = '';
      s += '<div class="sc-grid">';

      // Cluster Health scorecard
      var healthLabel, healthColor;
      if (tc && tc.severity === 'HIGH') { healthLabel = 'ISSUE'; healthColor = 'var(--red)'; }
      else if (tc && tc.severity === 'MEDIUM') { healthLabel = 'DEGRADED'; healthColor = 'var(--amber)'; }

          sb += '<div class="stall-bar">';
          sb += '<span class="sb-label">' + st.label + '</span>';
          sb += '<div class="sb-track"><div class="sb-fill" style="width:0%;background:' + st.color + '"></div></div>';
          sb += '<span class="sb-val">-%</span>';
          sb += '</div>';
        });
        sb += '<div style="margin-top:10px;border-top:1px solid var(--border);padding-top:8px;">';
        sb += '<div class="metric-bar"><div class="mb-dot" style="background:var(--text-muted)"></div><span class="mb-label">SM Efficiency</span><span class="mb-val" style="color:var(--text-muted)">-</span></div>';
        sb += '<div class="metric-bar"><div class="mb-dot" style="background:var(--text-muted)"></div><span class="mb-label">Power Draw</span><span class="mb-val" style="color:var(--text-muted)">-</span></div>';
        sb += '</div>';
        return sb;
      }());
      s += '</div>';

      // Flame Graph (grayed)
      s += '<div class="sub-panel">';
      s += wrapGrayed('nvtx_phases', function() {
        var fg = '';
        fg += '<div class="section-hdr" style="margin-bottom:10px;">AI FLAME GRAPH &mdash; KERNEL ATTRIBUTION</div>';
        var rows = [
          { label: 'Thread', spans: [{l:'train_step()',w:100,c:'#EAB308'}] },
          { label: 'Python', spans: [{l:'forward()',w:35,c:'#EAB308'},{l:'loss.backward()',w:30,c:'#EAB308'},{l:'optimizer.step()',w:15,c:'#EAB308'},{l:'data_load',w:15,c:'#EAB308'}] },
          { label: 'C/C++', spans: [{l:'aten::mm',w:28,c:'#F97316'},{l:'aten::conv2d',w:12,c:'#F97316'},{l:'autograd::backward',w:25,c:'#F97316'},{l:'sgd_step',w:12,c:'#F97316'},{l:'DataPipe::fill',w:12,c:'#F97316'}] },
          { label: 'CUDA', spans: [{l:'gemm_kern',w:25,c:'#22c55e'},{l:'conv_kern',w:10,c:'#22c55e'},{l:'nccl_allreduce',w:18,c:'#06b6d4'},{l:'bwd_kern',w:22,c:'#22c55e'},{l:'',w:25,c:'#1e2330'}] },
        ];
        rows.forEach(function(row) {
          var tot = row.spans.reduce(function(s, sp) { return s + sp.w; }, 0);
          fg += '<div style="display:flex;align-items:stretch;margin-bottom:2px;">';
          fg += '<div style="width:50px;color:var(--text-muted);font-size:9px;display:flex;align-items:center;flex-shrink:0;font-family:var(--font-mono);">' + row.label + '</div>';
          fg += '<div style="flex:1;display:flex;height:24px;gap:1px;">';
          row.spans.forEach(function(sp) {
            fg += '<div style="flex:' + (sp.w/tot) + ';background:' + sp.c + '30;border-left:2px solid ' + sp.c + ';display:flex;align-items:center;padding-left:4px;color:' + sp.c + ';font-size:8px;overflow:hidden;white-space:nowrap;font-family:var(--font-mono);">' + (sp.w > 8 ? sp.l : '') + '</div>';
          });
          fg += '</div></div>';
        });
        // Legend
        fg += '<div style="color:var(--text-muted);font-size:8px;margin-top:6px;padding-left:50px;font-family:var(--font-mono);">';
        fg += '<span style="color:#EAB308">&#9632;</span> Python ';
        fg += '<span style="margin-left:8px;color:#F97316">&#9632;</span> C/C++ ';
        fg += '<span style="margin-left:8px;color:#22c55e">&#9632;</span> GPU Kernel ';
        fg += '<span style="margin-left:8px;color:#06b6d4">&#9632;</span> NCCL ';
        fg += '</div>';
        return fg;
      }());
      s += '</div>';
      s += '</div>'; // grid-resp-1-2

      // Sparklines + NVTX Phases row
      s += '<div class="grid-2">';

      // Sparklines (real data if available)
      s += '<div class="sub-panel">';
      s += '<div class="section-hdr" style="margin-bottom:10px;">TEMPORAL TRACE &mdash; 60s WINDOW</div>';

      // NVTX Phase Bar (grayed mini version)
      s += '<div class="nvtx-bar" style="opacity:0.3;" title="Requires NVTX range probes on libnvToolsExt.so">';
      var nvtxPhases = [{l:'Forward',c:'#22c55e',f:30},{l:'Backward',c:'#f97316',f:35},{l:'Optimizer',c:'#3b82f6',f:15},{l:'DataLoad',c:'#a855f7',f:20}];
      nvtxPhases.forEach(function(ph) {
        s += '<div class="nvtx-seg" style="flex:' + ph.f + ';background:' + ph.c + '20;color:' + ph.c + '">' + ph.l + ' ' + ph.f + '%</div>';
      });
      s += '</div>';

      if (hasSnapshots) {
        s += '<div class="sparkline-row">';
        var latestCPU = snapshotHistory.cpu[snapshotHistory.cpu.length - 1];
        var latestMem = snapshotHistory.mem[snapshotHistory.mem.length - 1];
        var latestLoad = snapshotHistory.load[snapshotHistory.load.length - 1];

        s += '<div class="sparkline-item"><div class="sparkline-label"><span>CPU %</span><span class="val">' + (latestCPU != null ? latestCPU.toFixed(1) + '%' : '-') + '</span></div>';
        s += sparklineSVG(snapshotHistory.cpu, 'var(--amber)', 32) + '</div>';

        s += '<div class="sparkline-item"><div class="sparkline-label"><span>Mem %</span><span class="val">' + (latestMem != null ? latestMem.toFixed(1) + '%' : '-') + '</span></div>';
        s += sparklineSVG(snapshotHistory.mem, 'var(--cyan)', 32) + '</div>';

        s += '<div class="sparkline-item"><div class="sparkline-label"><span>Load Avg</span><span class="val">' + (latestLoad != null ? latestLoad.toFixed(2) : '-') + '</span></div>';
        s += sparklineSVG(snapshotHistory.load, 'var(--purple)', 32) + '</div>';

        // GPU Util sparkline (grayed)
        s += '<div class="sparkline-item" style="opacity:0.3;" title="Requires DCGM or NVML for GPU utilization time series">';
        s += '<div class="sparkline-label"><span>GPU Util</span><span class="val">-</span></div>';
        s += '<svg class="sparkline-svg" viewBox="0 0 200 32"></svg></div>';

        s += '</div>'; // sparkline-row
      } else {
        s += '<div class="no-data" style="padding:20px;"><p>Waiting for system snapshots...</p><p>Run <code>sudo ingero trace</code> to start collecting.</p></div>';
      }
      s += '</div>'; // sub-panel

      // Training Phases (grayed)
      s += '<div class="sub-panel">';
      s += wrapGrayed('nvtx_phases', function() {
        var tp = '';
        tp += '<div class="section-hdr" style="margin-bottom:8px;">TRAINING PHASES (NVTX)</div>';
        nvtxPhases.forEach(function(ph) {
          tp += '<div style="display:flex;align-items:center;gap:8px;padding:4px 0;">';
          tp += '<div style="width:10px;height:10px;border-radius:2px;background:' + ph.c + ';flex-shrink:0;"></div>';
          tp += '<span style="font-family:var(--font-mono);color:var(--text-sec);font-size:10px;">' + ph.l + '</span>';
          tp += '<span style="margin-left:auto;font-family:var(--font-mono);color:' + ph.c + ';font-weight:600;font-size:10px;">' + ph.f + '%</span>';
          tp += '</div>';
        });
        tp += '<div style="margin-top:12px;border-top:1px solid var(--border);padding-top:8px;">';
        tp += '<div style="font-size:9px;color:var(--text-muted);font-family:var(--font-mono);margin-bottom:4px;">ITERATION BREAKDOWN</div>';
        tp += '<div style="height:6px;display:flex;border-radius:3px;overflow:hidden;">';
        nvtxPhases.forEach(function(ph) {
          tp += '<div style="flex:' + ph.f + ';background:' + ph.c + '"></div>';
        });
        tp += '</div></div>';
        return tp;
      }());
      s += '</div>';

      s += '</div>'; // grid-2

      // CUDA Operations Table (real data)
      if (hasOps) {
        s += '<div class="card" style="margin-top:12px;overflow-x:auto;">';
        s += '<div class="section-hdr" style="margin-bottom:8px;">CUDA / HOST OPERATION LATENCY</div>';
        s += '<table class="ops-table">';
        s += '<thead><tr><th>Operation</th><th>Source</th><th class="num">Count</th>';
        if (ops.mode === 'percentile') {
          s += '<th class="num">P50</th><th class="num">P95</th><th class="num">P99</th>';
        } else {
          s += '<th class="num">Avg</th><th class="num">Min</th><th class="num">Max</th>';
        }
        s += '</tr></thead><tbody>';

        ops.ops.forEach(function(op) {
          s += '<tr>';
          s += '<td>' + esc(op.operation) + '</td>';
          s += '<td class="src">' + esc(op.source) + '</td>';
          s += '<td class="num">' + fmt(op.count) + '</td>';
          if (ops.mode === 'percentile') {
            s += '<td class="num">' + fmtUS(op.p50_us) + '</td>';
            s += '<td class="num">' + fmtUS(op.p95_us) + '</td>';
            s += '<td class="num" style="color:' + (op.p99_us > 10000 ? 'var(--amber)' : 'var(--text)') + '">' + fmtUS(op.p99_us) + '</td>';
          } else {
            s += '<td class="num">' + fmtUS(op.avg_us) + '</td>';
            s += '<td class="num">' + fmtUS(op.min_us) + '</td>';
            s += '<td class="num">' + fmtUS(op.max_us) + '</td>';
          }
          s += '</tr>';
        });

        s += '</tbody></table></div>';
      }

      // What-If Modeling (grayed)
      s += '<div class="card" style="margin-top:12px;">';
      s += wrapGrayed('what_if', function() {
        var wi = '';
        wi += '<div class="section-hdr" style="margin-bottom:8px;">WHAT-IF SCENARIO MODELING</div>';
        wi += '<div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));gap:4px 20px;">';
        ['Storage Bandwidth','CPU Capacity','PCIe Generation','HBM Capacity'].forEach(function(label) {
          wi += '<div style="display:flex;align-items:center;gap:8px;padding:4px 0;">';
          wi += '<span style="font-size:10px;color:var(--text-sec);font-family:var(--font-mono);min-width:120px;">' + label + '</span>';
          wi += '<div style="flex:1;height:4px;background:var(--border);border-radius:2px;"></div>';
          wi += '<span style="font-size:11px;font-family:var(--font-mono);color:var(--text-muted);font-weight:600;min-width:35px;">1.0x</span>';
          wi += '</div>';
        });
        wi += '</div>';
        return wi;
      }());
      s += '</div>';

      return s;
    });

    // No data message
    if (ov.event_count === 0) {
      html += '<div class="no-data"><p>No events in database.</p><p>Run <code>sudo ingero trace</code> to start collecting data,</p><p>or <code>ingero demo --no-gpu</code> to generate synthetic data.</p></div>';
    }

    // ── FOOTER ──
    html += '<div class="footer">';
    html += '<span>INGERO TELEMETRY &mdash; eBPF + CUDA PROBES &mdash; &lt;2% OVERHEAD</span>';
    html += '<span>TLS 1.3 &mdash; Polling every 2s' + (lastUpdate ? ' &mdash; Last: ' + lastUpdate.toLocaleTimeString() : '') + '</span>';
    html += '</div>';

    app.innerHTML = html;
  }

  // --- Controls ---
  window.__setSince = function(t) {
    sinceParam = t;
    loadAll();
  };

  window.__toggleSection = function(k) {
    openSections[k] = !openSections[k];
    render();
  };

  window.__setChainView = function(mode) {
    chainViewMode = mode;
    render();
  };

  window.__toggleChainExpand = function() {
    chainExpanded = !chainExpanded;
    render();
  };

  // --- Init ---
  async function init() {
    await loadCapabilities();
    await loadAll();
    setInterval(loadAll, 2000);
  }

  init();
})();
  </script>
</body>
</html>
