image:
  repository: ghcr.io/ingero-io/ingero
  tag: v0.8
  pullPolicy: IfNotPresent

# mode: "trace" (default) runs `ingero trace --record` for eBPF observability.
#       "fleet-push" runs `ingero fleet-push` for Fleet integration.
mode: trace

trace:
  record: true
  dbPath: /var/lib/ingero/ingero.db
  maxDb: "100g"
  extraArgs: []  # e.g., ["--debug", "--stack"]

fleetPush:
  endpoint: ""         # OTLP HTTP endpoint, e.g., http://ingero-fleet.ingero:4318
  thresholdUrl: ""     # GET fallback URL, e.g., http://ingero-fleet.ingero:8080
  clusterID: ""        # required
  nodeID: ""           # defaults to pod hostname if empty
  pushInterval: 5s
  insecure: true       # set false when using mTLS
  stub: false          # true = synthetic signals (smoke testing)
  extraArgs: []

resources:
  requests:
    memory: 256Mi
    cpu: 100m
  limits:
    memory: 512Mi
    cpu: "1"

nodeSelector:
  nvidia.com/gpu.present: "true"

tolerations:
  - key: nvidia.com/gpu
    operator: Exists
    effect: NoSchedule
  - key: nvidia.com/gpu
    operator: Exists
    effect: NoExecute

updateStrategy:
  type: OnDelete

serviceAccount:
  create: true
  name: ingero

namespace:
  create: true
