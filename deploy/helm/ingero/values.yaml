image:
  repository: ghcr.io/ingero-io/ingero
  tag: v0.8
  pullPolicy: IfNotPresent

# mode: "trace" (default) runs `ingero trace --record` for eBPF observability.
#       "fleet-push" runs `ingero fleet-push` for Fleet integration.
mode: trace

trace:
  record: true
  dbPath: /var/lib/ingero/ingero.db
  maxDb: "100g"
  extraArgs: []  # e.g., ["--debug", "--stack"]

fleetPush:
  endpoint: ""         # OTLP HTTP endpoint, e.g., http://ingero-fleet.ingero:4318
  thresholdUrl: ""     # GET fallback URL, e.g., http://ingero-fleet.ingero:8080
  clusterID: ""        # required
  nodeID: ""           # defaults to pod hostname if empty
  pushInterval: 5s
  insecure: true       # set false when using mTLS
  stub: false          # true = synthetic signals (smoke testing)
  # When stub=false (production default), fleet-push reads real signals from
  # the SQLite DB populated by a sibling `ingero trace --record` process. Both
  # containers must share a volume. The recommended deployment is a sidecar
  # pod with two containers (mode=trace + mode=fleet-push) sharing an
  # emptyDir at /var/lib/ingero, OR two DaemonSets (mode=trace first, then
  # mode=fleet-push) both mounting the same hostPath.
  signalDbPath: ""     # defaults to store.DefaultDBPath() if empty
  signalWindow: 60s    # rolling window; event_aggregates are minute-bucketed
  signalNumGPUs: 0     # 0 = autodetect (falls back to 1)
  warmupSamples: 30    # samples before first non-calibrating push
                       # warmup time = warmupSamples * pushInterval (default 30*5s = 150s)
  extraArgs: []

resources:
  requests:
    memory: 256Mi
    cpu: 100m
  limits:
    memory: 512Mi
    cpu: "1"

nodeSelector:
  nvidia.com/gpu.present: "true"

tolerations:
  - key: nvidia.com/gpu
    operator: Exists
    effect: NoSchedule
  - key: nvidia.com/gpu
    operator: Exists
    effect: NoExecute

updateStrategy:
  type: OnDelete

serviceAccount:
  create: true
  name: ingero

namespace:
  create: true
