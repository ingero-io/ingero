image:
  repository: ghcr.io/ingero-io/ingero
  tag: v0.7
  pullPolicy: IfNotPresent

trace:
  record: true
  dbPath: /var/lib/ingero/ingero.db
  maxDb: "100g"
  extraArgs: []  # e.g., ["--debug", "--stack"]

resources:
  requests:
    memory: 256Mi
    cpu: 100m
  limits:
    memory: 512Mi
    cpu: "1"

nodeSelector:
  nvidia.com/gpu.present: "true"

tolerations:
  - key: nvidia.com/gpu
    operator: Exists
    effect: NoSchedule
  - key: nvidia.com/gpu
    operator: Exists
    effect: NoExecute

updateStrategy:
  type: OnDelete

serviceAccount:
  create: true
  name: ingero

namespace:
  create: true
