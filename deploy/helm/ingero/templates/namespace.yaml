{{- if .Values.namespace.create }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Release.Namespace }}
  labels:
    {{- include "ingero.labels" . | nindent 4 }}
    app.kubernetes.io/part-of: ingero
    # Pod Security Admission: privileged required for eBPF (CAP_BPF, hostPID).
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/warn: privileged
{{- end }}
