# Ingero v0.3 — Full observability stack (OTEL quickstart)
# Usage: cd deploy && docker-compose up -d
# Then: open http://localhost:3000 (Grafana, admin/admin)
#
# Stack: Ingero → Grafana Alloy (OTLP receiver) → Prometheus → Grafana
version: "3.8"

services:
  alloy:
    image: grafana/alloy:latest
    volumes:
      - ./alloy-config.river:/etc/alloy/config.river
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    command: ["run", "/etc/alloy/config.river"]

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
    ports:
      - "3000:3000"
    volumes:
      - ./grafana-dashboard.json:/var/lib/grafana/dashboards/ingero.json
    depends_on:
      - prometheus
