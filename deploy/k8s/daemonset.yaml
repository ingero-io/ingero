# Ingero OSS DaemonSet — runs one observability pod per GPU node.
#
# Prerequisites:
#   - NVIDIA GPU Operator installed (provides nvidia.com/gpu.present label)
#   - Namespace: kubectl apply -f namespace.yaml
#   - RBAC: kubectl apply -f rbac.yaml
#
# Deployment modes:
#   1. Observation-only (default): monitors GPU workloads via eBPF, zero risk.
#   2. Remediation: add "--remediate" to args to enable memory tracker,
#      straggler detector, and UDS server for orchestrator communication.
#
# Graduated trust: deploy observation-only first, add orchestrator later.
#
# Query via kubectl exec:
#   kubectl exec -n ingero-system ds/ingero -- ingero explain --since 5m
#   kubectl exec -n ingero-system ds/ingero -- ingero query --since 1m --json
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ingero
  namespace: ingero-system
  labels:
    app.kubernetes.io/name: ingero
    app.kubernetes.io/component: observability
    # ingero-version:daemonset-image product=ingero channel=stable
    app.kubernetes.io/version: "0.10.0"
spec:
  # OnDelete: prevents eBPF event loss during rolling updates. Probes detach
  # when the old pod dies — OnDelete lets the operator control upgrade pace.
  updateStrategy:
    type: OnDelete
  selector:
    matchLabels:
      app.kubernetes.io/name: ingero
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ingero
        app.kubernetes.io/component: observability
        # ingero-version:daemonset-template-version product=ingero channel=stable
        app.kubernetes.io/version: "0.10.0"
    spec:
      hostPID: true
      terminationGracePeriodSeconds: 30
      serviceAccountName: ingero
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoExecute
      nodeSelector:
        nvidia.com/gpu.present: "true"
      containers:
        - name: ingero
          image: ghcr.io/ingero-io/ingero:latest
          imagePullPolicy: IfNotPresent
          # Default: observation-only mode. To enable remediation, add "--remediate":
          # args: ["trace", "--record", "--node", "$(MY_NODE_NAME)", "--remediate"]
          args:
            - "trace"
            - "--record"
            - "--node"
            - "$(MY_NODE_NAME)"
            - "--db"
            - "/var/lib/ingero/ingero.db"
            - "--max-db"
            - "100g"
          env:
            - name: MY_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            # NVIDIA Container Toolkit: inject GPU driver libs into container
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "utility,compute"
          securityContext:
            # eBPF uprobe attachment to host process libraries requires
            # privileged mode (cross-namespace ELF access + BPF + perf).
            # CAP_BPF+CAP_PERFMON+CAP_SYS_ADMIN insufficient due to
            # kernel LSM/seccomp restrictions in container runtimes.
            privileged: true
          livenessProbe:
            exec:
              command: ["/usr/local/bin/ingero", "version"]
            initialDelaySeconds: 5
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "pgrep -x ingero > /dev/null"
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: btf
              mountPath: /sys/kernel/btf
              readOnly: true
            - name: debugfs
              mountPath: /sys/kernel/debug
            - name: bpffs
              mountPath: /sys/fs/bpf
            - name: tmp
              mountPath: /tmp
            - name: shm
              mountPath: /dev/shm
            - name: data
              mountPath: /var/lib/ingero
            - name: log
              mountPath: /var/log/ingero
          resources:
            requests:
              cpu: 50m
              memory: 100Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: btf
          hostPath:
            path: /sys/kernel/btf
        - name: debugfs
          hostPath:
            path: /sys/kernel/debug
        - name: bpffs
          hostPath:
            path: /sys/fs/bpf
            type: DirectoryOrCreate
        - name: tmp
          hostPath:
            path: /tmp
            type: Directory
        - name: shm
          hostPath:
            path: /dev/shm
            type: Directory
        - name: data
          hostPath:
            path: /var/lib/ingero
            type: DirectoryOrCreate
        - name: log
          hostPath:
            path: /var/log/ingero
            type: DirectoryOrCreate
