apiVersion: v1
kind: ServiceAccount
metadata:
  name: ingero
  namespace: ingero-system
  labels:
    app.kubernetes.io/name: ingero
---
# ClusterRole for reading pod metadata. Required for K8s API integration
# (GPU pod auto-discovery, pod-to-container mapping). Added in v0.7.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ingero
  labels:
    app.kubernetes.io/name: ingero
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ingero
  labels:
    app.kubernetes.io/name: ingero
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ingero
subjects:
  - kind: ServiceAccount
    name: ingero
    namespace: ingero-system
