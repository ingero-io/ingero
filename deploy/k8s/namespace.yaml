apiVersion: v1
kind: Namespace
metadata:
  name: ingero-system
  labels:
    app.kubernetes.io/name: ingero
    app.kubernetes.io/part-of: ingero
    # Pod Security Admission: privileged required for eBPF (CAP_BPF, hostPID).
    # Without these labels, K8s 1.25+ rejects privileged pods in the namespace.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/warn: privileged
