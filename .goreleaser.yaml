version: 2

project_name: ingero

builds:
  - main: ./cmd/ingero/
    binary: ingero
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
      - -tags=linux
    ldflags:
      - -s -w
      - -X github.com/ingero-io/ingero/internal/version.version={{.Version}}
      - -X github.com/ingero-io/ingero/internal/version.commit={{.ShortCommit}}
      - -X github.com/ingero-io/ingero/internal/version.date={{.Date}}

archives:
  - formats:
      - tar.gz
    name_template: "ingero_{{.Version}}_{{.Os}}_{{.Arch}}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "ingero_checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  groups:
    - title: Features
      regexp: 'feat[:(]'
    - title: Bug Fixes
      regexp: 'fix[:(]'
    - title: Documentation
      regexp: 'docs[:(]'
    - title: Other
      order: 999
  filters:
    exclude:
      - 'Merge'

release:
  github:
    owner: ingero-io
    name: ingero
  draft: false
  prerelease: auto
  mode: append

dockers:
  - image_templates:
      - "ghcr.io/ingero-io/ingero:v{{ .Version }}-amd64"
    use: buildx
    dockerfile: deploy/docker/Dockerfile.goreleaser
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title=Ingero"
      - "--label=org.opencontainers.image.description=Production GPU Causal Observability"
      - "--label=org.opencontainers.image.source=https://github.com/ingero-io/ingero"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
    goarch: amd64

  - image_templates:
      - "ghcr.io/ingero-io/ingero:v{{ .Version }}-arm64"
    use: buildx
    dockerfile: deploy/docker/Dockerfile.goreleaser
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title=Ingero"
      - "--label=org.opencontainers.image.description=Production GPU Causal Observability"
      - "--label=org.opencontainers.image.source=https://github.com/ingero-io/ingero"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
    goarch: arm64

docker_manifests:
  - name_template: "ghcr.io/ingero-io/ingero:v{{ .Version }}"
    image_templates:
      - "ghcr.io/ingero-io/ingero:v{{ .Version }}-amd64"
      - "ghcr.io/ingero-io/ingero:v{{ .Version }}-arm64"

  - name_template: "ghcr.io/ingero-io/ingero:v{{ .Major }}.{{ .Minor }}"
    image_templates:
      - "ghcr.io/ingero-io/ingero:v{{ .Version }}-amd64"
      - "ghcr.io/ingero-io/ingero:v{{ .Version }}-arm64"

  - name_template: "ghcr.io/ingero-io/ingero:latest"
    image_templates:
      - "ghcr.io/ingero-io/ingero:v{{ .Version }}-amd64"
      - "ghcr.io/ingero-io/ingero:v{{ .Version }}-arm64"

snapshot:
  version_template: "{{.Tag}}-next"
